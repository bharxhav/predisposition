name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-features -- -D warnings
      - run: cargo test
      - run: cargo test --features serde

  tag-if-needed:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check version and tag
        run: |
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Latest git tag:     $LATEST_TAG"
          if [ "$CARGO_VERSION" != "$LATEST_TAG" ]; then
            echo "Version mismatch — creating tag $CARGO_VERSION"
            git tag "$CARGO_VERSION"
            git push origin "$CARGO_VERSION"
          else
            echo "Already tagged $CARGO_VERSION — nothing to do"
          fi
